name: Java Spring Boot CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission
        working-directory: ./demo
        run: chmod +x mvnw

      - name: Build
        working-directory: ./demo
        run: mvn clean package -DskipTests