name: Java Spring Boot CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code từ GitHub
        uses: actions/checkout@v4

      - name: Cài đặt môi trường Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Tự động Biên dịch và Chạy Kiểm thử (Build & Test)
        # Thêm dòng này để ép máy ảo GitHub chui vào đúng thư mục chứa pom.xml trước khi build
        working-directory: ./demo
        run: mvn clean package