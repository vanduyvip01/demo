name: Java Spring Boot CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code từ GitHub
        uses: actions/checkout@v4

      - name: Cài đặt môi trường Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Đổi từ 17 sang 21 ở đây bạn nhé
          distribution: 'temurin'
          cache: 'maven'

      - name: Tự động Biên dịch và Chạy Kiểm thử (Build & Test)
        working-directory: ./demo
        run: mvn clean package