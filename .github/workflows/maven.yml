name: Java Spring Boot CI/CD (Docker Hub)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code từ GitHub
        uses: actions/checkout@v4

      - name: Cài đặt môi trường Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Tự động Biên dịch và Đóng gói file JAR
        working-directory: ./demo
        run: mvn clean package -DskipTests # -DskipTests để bỏ qua test chạy nhanh hơn nếu muốn, hoặc xóa đi nếu muốn chạy cả test

      # --- BẮT ĐẦU CÁC BƯỚC ĐÓNG GÓI DOCKER ---

      - name: Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
              username: ${{ secrets.DOCKER_USERNAME }}
              password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Thiết lập Docker Buildx (Công cụ build ảnh nâng cao)
        uses: docker/setup-buildx-action@v3

      - name: Build và Push Image lên Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./demo
          push: true
          tags: |
            duyvip/demo-springboot:latest
            duyvip/demo-springboot:${{ github.sha }}