<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >

    <title>Login</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="login-container">

    <h1 class="login-title">
        Login
    </h1>

    <form id="loginForm">

        <div class="form-group">

            <label>
                Username
            </label>

            <input
                    type="text"
                    id="username"
                    placeholder="Enter username"
                    required
            >
        </div>
        <div class="form-group">
            <label>
                Password
            </label>

            <input
                    type="password"
                    id="password"
                    placeholder="Enter password"
                    required
            >
        </div>
        <button
                type="submit"
                class="login-btn"
        >
            Login
        </button>
    </form>
    <div
            class="message"
            id="message"
    ></div>

</div>

<script src="script.js"></script>

</body>
</html>
