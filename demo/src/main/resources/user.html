<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>User List</title>

    <link rel="stylesheet" href="user.css">

</head>

<body>

<div class="login-container">
    <h1>User List</h1>
    <h2>
        Total Users:
        <span id="totalUsers">
            0
        </span>
    </h2>
    <br>

    <div class="form-group">
        <input
                type="text"
                id="name"
                placeholder="Name"
        >
        <input
                type="number"
                id="age"
                placeholder="Age"
        >
        <input
                type="email"
                id="email"
                placeholder="Email"
        >
        <input
                type="text"
                id="phone"
                placeholder="Phone"
        >

        <button
                class="add-btn"
                onclick="addUser()"
        >
            Add User
        </button>

    </div>
    <hr>
    <!-- USER LIST -->

    <div id="userList">

    </div>

    <br>

    <button
            class="logout-btn"
            onclick="logout()"
    >
        Logout
    </button>

</div>

<script>

    const token =
    localStorage.getItem("token");

    // CHECK LOGIN
    if (!token){
    window.location.href =
    "login.html";

    }

    // LOAD USER + TOTAL

    async function loadUsers(){
    try{

    const response =
    await fetch(

    "http://localhost:8080/users/stats",
    {

    method:"GET",

    headers:{

    Authorization:
    `Bearer ${token}`

    }

    }

    );

    const result =
    await response.json();

    console.log(result);


    // TOTAL USER

    document
    .getElementById(
    "totalUsers"
    )
    .innerText =

    result.totalUsers;

    // USERS

    let html =
    "";
    result.users.forEach(

    user=>{

    html +=`
    <div class="user-card">

    <h3>

    ${user.name}

    </h3>

    <p>

    Age:
    ${user.age}

    </p>

    <p>

    Email:
    ${user.email}

    </p>

    <p>

    Phone:
    ${user.phone}

    </p>

    <p>

    Gender:
    ${user.gender}

    </p>

    <button

    class="delete-btn"

    onclick="deleteUser(${user.id})"

    >

    Delete

    </button>

    </div>

    `;

    }

    );


    document
    .getElementById(
    "userList"
    )
    .innerHTML =
    html;

    }

    catch(error){

    console.log(error);

    }

    }

    // ADD USER

    async function addUser(){

    const user={

    name:
    document
    .getElementById("name")
    .value,

    age:
    parseInt(
    document
    .getElementById("age")
    .value
    ),

    email:
    document
    .getElementById("email")
    .value,

    phone:
    document
    .getElementById("phone")
    .value,

    gender:
    "MALE"

    };


    try{

    const response =
    await fetch(

    "http://localhost:8080/users",

    {

    method:"POST",

    headers:{

    Authorization:
    `Bearer ${token}`,

    "Content-Type":
    "application/json"

    },

    body:
    JSON.stringify(user)

    }

    );

    const data =
    await response.json();

    alert(
    data.message
    );


    // clear

    document
    .getElementById("name")
    .value="";

    document
    .getElementById("age")
    .value="";

    document
    .getElementById("email")
    .value="";

    document
    .getElementById("phone")
    .value="";

    loadUsers();

    }

    catch(error){

    console.log(error);

    }

    }

    // DELETE

    async function deleteUser(id){

    try{

    const response =
    await fetch(

    `http://localhost:8080/users/${id}`,

    {

    method:
    "DELETE",

    headers:{

    Authorization:
    `Bearer ${token}`

    }

    }

    );

    const data =
    await response.json();

    alert(
    data.message
    );

    loadUsers();

    }

    catch(error){

    console.log(error);

    }

    }



    // LOGOUT

    function logout(){

    localStorage.removeItem(
    "token"
    );

    window.location.href =
    "login.html";

    }

    // START

    loadUsers();

</script>

</body>

</html>
